<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A Tiny Question 🐧</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#b6e3ff,#d9f3ff,#eefaff);
font-family:'Poppins',sans-serif;
overflow:hidden;
}

.card{
background:white;
padding:40px 60px;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
text-align:center;
animation:popIn 0.7s ease;
}

@keyframes popIn{
0%{transform:scale(0.7);opacity:0}
100%{transform:scale(1);opacity:1}
}

h1{
color:#2a7fbf;
}

button{
border:none;
padding:14px 26px;
font-size:18px;
border-radius:30px;
cursor:pointer;
margin:10px;
}

#yes{
background:#2a7fbf;
color:white;
transition:0.2s;
}

#yes:hover{
transform:scale(1.15);
}

#no{
background:#e8f6ff;
position:relative;
}

.penguin{
font-size:90px;
margin-top:20px;
transition:transform 0.3s;
}

.penguin:hover{
transform:scale(1.2) rotate(-5deg);
}

.message{
color:#2a7fbf;
font-size:16px;
height:20px;
}

.success{
font-size:28px;
color:#2a7fbf;
margin:10px 0;
}

.snow{
position:absolute;
width:100%;
height:100%;
pointer-events:none;
}

.flake{
position:absolute;
animation:snowfall linear infinite;
}

@keyframes snowfall{
0%{
transform:translateY(-50px);
opacity:1;
}
100%{
transform:translateY(700px);
opacity:0;
}
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-5px)}
50%{transform:translateX(5px)}
75%{transform:translateX(-5px)}
100%{transform:translateX(0)}
}

</style>
</head>

<body>

<div class="card" id="card">

<h1>Utkarsha, lets go out and celebrate your birthday? 🐧</h1>

<button id="yes" onclick="yesClicked()">Yes ❄️</button>
<button id="no" onclick="noClicked()">No 🙈</button>

<div class="penguin" id="penguin">🐧</div>
<div class="message" id="message"></div>

</div>

<div class="snow" id="snow"></div>

<script>

let noCount = 0;
let yesSize = 1;

ambientSnow();

function noClicked(){

noCount++;

let penguin=document.getElementById("penguin");
let msg=document.getElementById("message");
let noBtn=document.getElementById("no");

if(noCount==1){
penguin.innerHTML="🐧";
msg.innerText="The penguin looks a little sad...";
}

else if(noCount==2){
penguin.innerHTML="🥺";
msg.innerText="Why would you say no to a penguin?";
}

else if(noCount==3){
penguin.innerHTML="😢";
msg.innerText="The penguin is crying now...";
}

else if(noCount==4){
penguin.innerHTML="😭";
msg.innerText="Fine... the penguin is changing your answer.";

noBtn.innerText="Yes 💙";
noBtn.style.background="#2a7fbf";
noBtn.style.color="white";
noBtn.onclick=yesClicked;

return;
}

let x=(Math.random()-0.5)*200;
let y=(Math.random()-0.5)*100;

noBtn.style.transform=`translate(${x}px,${y}px)`;

/* Grow YES button */

let yesBtn=document.getElementById("yes");
yesSize+=0.15;
yesBtn.style.transform=`scale(${yesSize})`;

/* Shake card */

let card=document.getElementById("card");
card.style.animation="shake 0.3s";
setTimeout(()=>{card.style.animation="";},300);

}

function yesClicked(){

let card=document.getElementById("card");

card.innerHTML=`
<h1 class="success">YAY!! The penguin is happy 🐧❄️</h1>
<h2 class="success">Now that we are going, text me to decide on a plan ☃️</h2>
`;

createCelebration();

}

function createCelebration(){

let container=document.getElementById("snow");

for(let i=0;i<40;i++){

let heart=document.createElement("div");

heart.className="flake";
heart.innerHTML="❄️";

heart.style.left=Math.random()*100+"%";
heart.style.fontSize=(20+Math.random()*20)+"px";
heart.style.animationDuration=(3+Math.random()*2)+"s";

container.appendChild(heart);

}

}

function ambientSnow(){

let container=document.getElementById("snow");

setInterval(()=>{

let flake=document.createElement("div");

flake.className="flake";
flake.innerHTML="❄️";

flake.style.left=Math.random()*100+"%";
flake.style.fontSize=(10+Math.random()*10)+"px";
flake.style.animationDuration=(5+Math.random()*5)+"s";

container.appendChild(flake);

setTimeout(()=>flake.remove(),8000);

},400);

}

</script>

</body>
</html>
