<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A Tiny Question 💌</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd6e7,#ffe8f2,#ffd6f6);
    font-family:'Comic Sans MS','Poppins',sans-serif;
    overflow:hidden;
}

.card{
    background:white;
    padding:40px 60px;
    border-radius:25px;
    box-shadow:0 15px 40px rgba(0,0,0,0.15);
    text-align:center;
}

h1{
    color:#ff4d8d;
}

button{
    border:none;
    padding:14px 26px;
    font-size:18px;
    border-radius:30px;
    cursor:pointer;
    margin:10px;
}

#yes{
    background:#ff4d8d;
    color:white;
    transition:0.2s;
}

#yes:hover{
    transform:scale(1.15);
}

#no{
    background:#f0f0f0;
    position:relative;
}

.penguin{
    font-size:90px;
    margin-top:20px;
}

.message{
    color:#ff4d8d;
    font-size:16px;
    height:20px;
}

.success{
    font-size:28px;
    color:#ff4d8d;
    margin:10px 0;
}

.hearts{
    position:absolute;
    width:100%;
    height:100%;
    pointer-events:none;
}

.heart{
    position:absolute;
    animation:float 4s linear infinite;
}

@keyframes float{
    0%{transform:translateY(0);opacity:1}
    100%{transform:translateY(-600px);opacity:0}
}

</style>
</head>

<body>

<div class="card" id="card">

<h1>Utkarsha, lets go out and celebrate your birthday? 🐧</h1>

<button id="yes" onclick="yesClicked()">Yes 💖</button>
<button id="no" onclick="noClicked()">No 🙈</button>

<div class="penguin" id="penguin">🐧</div>
<div class="message" id="message"></div>

</div>

<div class="hearts" id="hearts"></div>

<script>

let noCount = 0;

function noClicked(){

noCount++;

let penguin=document.getElementById("penguin");
let msg=document.getElementById("message");

if(noCount==1){
penguin.innerHTML="🐧";
msg.innerText="The penguin looks a little sad...";
}
else if(noCount==2){
penguin.innerHTML="🥺";
msg.innerText="Why would you say no to a penguin?";
}
else if(noCount==3){
penguin.innerHTML="😢";
msg.innerText="The penguin is crying now...";
}
else{
penguin.innerHTML="😭";
msg.innerText="Please don't break the penguin's heart 🐧";
}

let btn=document.getElementById("no");

let x=(Math.random()-0.5)*200;
let y=(Math.random()-0.5)*100;

btn.style.transform=`translate(${x}px,${y}px)`;

}

function yesClicked(){

let card = document.getElementById("card");

card.innerHTML = `
<h1 class="success">YAY!! The penguin is happy 🐧💖</h1>
<h2 class="success">Now that we are going, text me to decide on a plan 🐧</h2>
`;

createHearts();

}

function createHearts(){

let container=document.getElementById("hearts");

for(let i=0;i<40;i++){

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="💗";

heart.style.left=Math.random()*100+"%";
heart.style.bottom="-20px";
heart.style.fontSize=(20+Math.random()*20)+"px";
heart.style.animationDuration=(3+Math.random()*2)+"s";

container.appendChild(heart);

}

}

</script>

</body>
</html>
